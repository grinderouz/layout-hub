<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Layouts - Grinderouz | Clash Of Clan Layouts</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --coc-gold: #f3c31b;
            --coc-gold-dark: #d4a017;
            --coc-stone: #030303; 
            --coc-border: #33553e; 
        }

        body {
            font-family: 'Open+Sans', sans-serif;
            background-color: var(--coc-stone);
            color: #f8fafc; 
            scroll-behavior: smooth;
        }

        .hero-pattern {
            background-color: var(--coc-stone);
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
        }

        .btn-gold {
            background: linear-gradient(to bottom, var(--coc-gold), var(--coc-gold-dark));
            box-shadow: 0 4px 0 #9c730c, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        .btn-gold:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #9c730c, 0 2px 5px rgba(0,0,0,0.5);
        }

        .card-hover {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-hover:hover {
            transform: translateY(-5px) scale(1.02);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation Container (Populated by layoutnav.js) -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <div class="hero-pattern border-b border-slate-800 py-16 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <h1 class="text-4xl md:text-6xl font-black text-white uppercase tracking-tight mb-4 drop-shadow-lg">
                Clash of Clans <span class="text-[var(--coc-gold)]">Layouts</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-semibold max-w-2xl mx-auto">
                Find the perfect base for War, Farming, Trophy pushing, and more.
            </p>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Search & Filter Controls -->
        <div class="bg-slate-900/50 p-4 md:p-6 rounded-2xl border border-slate-800 mb-8 shadow-xl">
            <!-- Search Bar -->
            <div class="relative mb-6">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" id="search-input" class="block w-full pl-12 pr-4 py-4 bg-slate-800 border-2 border-slate-700 rounded-xl leading-5 bg-transparent text-white placeholder-slate-400 focus:outline-none focus:bg-slate-800 focus:border-[var(--coc-gold)] focus:ring-0 transition-colors duration-200 text-lg shadow-inner" placeholder="Search by Town Hall (e.g., TH13), Category (e.g., War), or Title...">
            </div>

            <!-- Town Hall Level Filters -->
            <div class="flex items-center justify-between gap-4">
                <div class="flex-1 overflow-x-auto pb-2 -mb-2 no-scrollbar">
                    <div class="flex space-x-2" id="th-filters">
                        <button class="th-filter active px-6 py-2.5 rounded-lg font-black uppercase tracking-wider text-sm border-2 border-[var(--coc-gold)] bg-[var(--coc-gold)] text-black shadow-lg" data-th="ALL">
                            All TH
                        </button>
                        <!-- Script will inject TH buttons here based on data -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Layouts Grid -->
        <div id="layouts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards will be injected here -->
        </div>

        <!-- No Results State -->
        <div id="no-results" class="hidden text-center py-20">
            <svg class="mx-auto h-16 w-16 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="text-xl font-bold text-slate-300 mb-2">No layouts found</h3>
            <p class="text-slate-500">Try adjusting your search query or filters.</p>
        </div>

    </div>

    <!-- External Scripts -->
    <script src="layoutnav.js"></script>
    <script src="layoutdb.js"></script>

    <!-- Main Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Assume layoutdb.js exposes a global variable containing the base data.
            // Adjust "layouts" to whatever variable name is used in layoutdb.js if different.
            const db = typeof layouts !== 'undefined' ? layouts : (typeof databases !== 'undefined' ? databases : {});
            
            const grid = document.getElementById('layouts-grid');
            const noResults = document.getElementById('no-results');
            const searchInput = document.getElementById('search-input');
            const filtersContainer = document.getElementById('th-filters');
            
            let currentTH = 'ALL';
            let searchQuery = '';

            // 1. Initialize TH Filter Buttons dynamically based on available data
            const availableTHs = Object.keys(db).sort((a, b) => b - a); // Sort TH descending
            availableTHs.forEach(th => {
                const btn = document.createElement('button');
                btn.className = 'th-filter px-6 py-2.5 rounded-lg font-black uppercase tracking-wider text-sm border-2 border-slate-700 bg-slate-800 text-slate-300 hover:border-slate-500 hover:text-white transition-colors whitespace-nowrap';
                btn.dataset.th = th;
                btn.textContent = `TH ${th}`;
                filtersContainer.appendChild(btn);
            });

            // 2. Setup Event Listeners
            // Search Input
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderLayouts();
            });

            // Filter Buttons
            filtersContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.th-filter');
                if (!btn) return;

                // Update active state styling
                document.querySelectorAll('.th-filter').forEach(b => {
                    b.classList.remove('border-[var(--coc-gold)]', 'bg-[var(--coc-gold)]', 'text-black', 'shadow-lg');
                    b.classList.add('border-slate-700', 'bg-slate-800', 'text-slate-300');
                });
                
                btn.classList.remove('border-slate-700', 'bg-slate-800', 'text-slate-300');
                btn.classList.add('border-[var(--coc-gold)]', 'bg-[var(--coc-gold)]', 'text-black', 'shadow-lg');

                currentTH = btn.dataset.th;
                renderLayouts();
            });

            // 3. Render Function
            function renderLayouts() {
                grid.innerHTML = '';
                let displayLayouts = [];

                // Gather layouts based on selected TH
                for (let thLevel in db) {
                    if (currentTH === 'ALL' || currentTH === thLevel) {
                        // Append the TH level to the object for search context
                        const basesWithTH = db[thLevel].map(base => ({ ...base, thLevel: thLevel }));
                        displayLayouts = displayLayouts.concat(basesWithTH);
                    }
                }

                // Apply Search Filter
                if (searchQuery) {
                    displayLayouts = displayLayouts.filter(layout => {
                        const titleMatch = layout.title && layout.title.toLowerCase().includes(searchQuery);
                        const typeMatch = layout.type && layout.type.name && layout.type.name.toLowerCase().includes(searchQuery);
                        const thMatch = `th${layout.thLevel}`.includes(searchQuery) || `th ${layout.thLevel}`.includes(searchQuery);
                        const idMatch = layout.id && layout.id.toString().includes(searchQuery);
                        
                        return titleMatch || typeMatch || thMatch || idMatch;
                    });
                }

                // Show/Hide No Results
                if (displayLayouts.length === 0) {
                    grid.classList.add('hidden');
                    noResults.classList.remove('hidden');
                    return;
                } else {
                    grid.classList.remove('hidden');
                    noResults.classList.add('hidden');
                }

                // Render Cards
                displayLayouts.forEach(layout => {
                    // Fallback colors if type doesn't specify
                    const typeColorClass = layout.type?.color || 'bg-slate-900/50 text-slate-400 border-slate-700/50';
                    const typeName = layout.type?.name || 'Uncategorized';
                    
                    const cardHTML = `
                        <div class="card-hover bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-xl flex flex-col h-full">
                            <div class="relative h-48 bg-slate-800 overflow-hidden group">
                                <img src="${layout.image}" alt="${layout.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/600x400/1e293b/475569?text=Image+Not+Found'">
                                
                                <div class="absolute top-0 right-0">
                                    <span class="${typeColorClass} text-[10px] font-black uppercase px-3 py-1.5 rounded-bl-xl border-b border-l tracking-tighter shadow-xl backdrop-blur-sm">
                                        ${typeName}
                                    </span>
                                </div>
                                <div class="absolute top-0 left-0">
                                    <span class="bg-[var(--coc-stone)] text-white text-[12px] font-black uppercase px-3 py-1.5 rounded-br-xl border-b border-r border-slate-700 shadow-xl backdrop-blur-sm">
                                        TH ${layout.thLevel}
                                    </span>
                                </div>
                            </div>
                            
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-lg font-black text-white uppercase leading-tight mb-2 min-h-[3rem] line-clamp-2">${layout.title}</h3>
                                <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-800">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${layout.date || 'Recent'}</span>
                                    <span class="text-[10px] text-slate-600 font-bold">ID: #${layout.id}</span>
                                </div>
                                
                                <a href="${layout.link}" target="_blank" class="btn-gold text-black mt-4 w-full py-3 rounded-lg font-black uppercase tracking-widest flex items-center justify-center gap-2 text-sm shadow-md hover:shadow-xl">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"></path><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 1 1 0 00-1 1v2a1 1 0 01-1 1H6a1 1 0 01-1-1V6a1 1 0 011-1h1.5a1 1 0 001-1z"></path></svg>
                                    Copy Layout
                                </a>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });
            }

            // Initial Render
            renderLayouts();
        });
    </script>
</body>
</html>
